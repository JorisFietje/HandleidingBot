<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HandleidingChat</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

  <div class="layout">

    <!-- Zijbalk: geschiedenis -->
    <aside class="zijbalk" id="zijbalk">
      <div class="zijbalk-header">
        <span class="zijbalk-titel">Gesprekken</span>
        <button class="zijbalk-knop" onclick="nieuwGesprek()" title="Nieuw gesprek">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16">
            <path d="M12 5v14M5 12h14"/>
          </svg>
        </button>
      </div>
      <div class="sessie-lijst" id="sessieLijst"></div>
    </aside>

    <!-- Hoofdgebied -->
    <div class="hoofd">

      <!-- Header -->
      <header class="header">
        <button class="menu-knop" id="menuKnop" onclick="toggleZijbalk()" title="Zijbalk">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
            <path d="M15 18l-6-6 6-6"/>
          </svg>
        </button>
        <div class="header-info">
          <span class="header-titel">HandleidingChat</span>
          <span class="header-subtitel">078 651 11 17 &nbsp;|&nbsp; info@metesco.nl</span>
        </div>
      </header>

      <!-- Chat berichten -->
      <main class="chat-venster" id="chatVenster">
        <div class="welkom-bericht">
          <div class="welkom-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="32" height="32">
              <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
            </svg>
          </div>
          <h2>Welkom bij HandleidingChat</h2>
          <p>Stel een vraag over een van de beschikbare handleidingen.</p>
        </div>
      </main>

      <!-- Invoerbalk -->
      <footer class="invoer-balk">
        <div class="invoer-inner">
          <textarea
            id="invoerVeld"
            placeholder="Stel een vraag..."
            autocomplete="off"
            rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();verstuurBericht();}"
          ></textarea>
          <button id="verstuurKnop" onclick="verstuurBericht()" aria-label="Versturen">
            <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
        </div>
      </footer>

    </div>
  </div>

  <script src="/static/script.js?v=5"></script>
</body>
</html>
